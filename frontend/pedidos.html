<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos - Sitema Delivery SaaS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="dashboard.html">
                <i class="bi bi-shop"></i> Sitema Delivery SaaS
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="lojas.html">Lojas</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="produtos.html">Produtos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="pedidos.html">Pedidos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="logout()">Sair</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid p-4">
        <div class="row mb-4">
            <div class="col-md-6">
                <h1>Gerenciar Pedidos</h1>
            </div>
            <div class="col-md-6 text-end">
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addPedidoModal">
                    <i class="bi bi-plus-lg"></i> Novo Pedido
                </button>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-4">
                <select class="form-select" id="statusFilter">
                    <option value="">Todos os Status</option>
                    <option value="aguardando pagamento">Aguardando Pagamento</option>
                    <option value="pago">Pago</option>
                    <option value="em preparação">Em Preparação</option>
                    <option value="em entrega">Em Entrega</option>
                    <option value="entregue">Entregue</option>
                    <option value="cancelado">Cancelado</option>
                </select>
            </div>
        </div>

        <div class="card shadow">
            <div class="card-body">
                <table class="table table-hover" id="pedidosTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Cliente</th>
                            <th>Telefone</th>
                            <th>Total</th>
                            <th>Status</th>
                            <th>Data</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal Novo Pedido -->
    <div class="modal fade" id="addPedidoModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Novo Pedido</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="addPedidoForm">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="ped_loja" class="form-label">Loja</label>
                            <select class="form-control" id="ped_loja" name="loja_id" required></select>
                        </div>
                        <div class="mb-3">
                            <label for="ped_cliente" class="form-label">Nome do Cliente</label>
                            <input type="text" class="form-control" id="ped_cliente" name="cliente_nome" required>
                        </div>
                        <div class="mb-3">
                            <label for="ped_telefone" class="form-label">Telefone</label>
                            <input type="tel" class="form-control" id="ped_telefone" name="telefone" required>
                        </div>
                        <div class="mb-3">
                            <label for="ped_endereco" class="form-label">Endereço</label>
                            <input type="text" class="form-control" id="ped_endereco" name="endereco" required>
                        </div>
                        <div class="mb-3">
                            <label for="ped_total" class="form-label">Total (R$)</label>
                            <input type="number" class="form-control" id="ped_total" name="total" step="0.01" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Criar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Modal Editar Status -->
    <div class="modal fade" id="editStatusModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Atualizar Status</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="editStatusForm">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="edit_status" class="form-label">Status</label>
                            <select class="form-control" id="edit_status" name="status" required>
                                <option value="aguardando pagamento">Aguardando Pagamento</option>
                                <option value="pago">Pago</option>
                                <option value="em preparação">Em Preparação</option>
                                <option value="em entrega">Em Entrega</option>
                                <option value="entregue">Entregue</option>
                                <option value="cancelado">Cancelado</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Atualizar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p style="font-size: 12px; margin: 0;">
            <a href="terms.html" class="text-decoration-none text-light">Termos de Serviço</a> | 
            <a href="privacy.html" class="text-decoration-none text-light">Política de Privacidade</a>
        </p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/pedidos.js"></script>
    <script src="security-protection.js"></script>
</body>
</html>
