<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos - Sitema Delivery SaaS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="dashboard.html">
                <i class="bi bi-shop"></i> Sitema Delivery SaaS
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="lojas.html">Lojas</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="produtos.html">Produtos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="pedidos.html">Pedidos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="logout()">Sair</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid p-4">
        <div class="row mb-4">
            <div class="col-md-6">
                <h1>Gerenciar Produtos</h1>
            </div>
            <div class="col-md-6 text-end">
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addProdutoModal">
                    <i class="bi bi-plus-lg"></i> Novo Produto
                </button>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-6">
                <select class="form-select" id="lojaSelect">
                    <option value="">Selecione uma loja</option>
                </select>
            </div>
            <div class="col-md-6">
                <input type="text" class="form-control" id="searchProduto" placeholder="Buscar produto...">
            </div>
        </div>

        <div class="card shadow">
            <div class="card-body">
                <div class="row" id="produtosContainer"></div>
            </div>
        </div>
    </div>

    <!-- Modal Novo Produto -->
    <div class="modal fade" id="addProdutoModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Novo Produto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="addProdutoForm">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="prod_loja" class="form-label">Loja</label>
                            <select class="form-control" id="prod_loja" name="loja_id" required></select>
                        </div>
                        <div class="mb-3">
                            <label for="prod_nome" class="form-label">Nome</label>
                            <input type="text" class="form-control" id="prod_nome" name="nome" required>
                        </div>
                        <div class="mb-3">
                            <label for="prod_descricao" class="form-label">Descrição</label>
                            <textarea class="form-control" id="prod_descricao" name="descricao" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="prod_preco" class="form-label">Preço (R$)</label>
                            <input type="number" class="form-control" id="prod_preco" name="preco" step="0.01" required>
                        </div>
                        <div class="mb-3">
                            <label for="prod_categoria" class="form-label">Categoria</label>
                            <input type="text" class="form-control" id="prod_categoria" name="categoria" required>
                        </div>
                        <div class="mb-3">
                            <label for="prod_imagem" class="form-label">URL da Imagem</label>
                            <input type="url" class="form-control" id="prod_imagem" name="imagem">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Criar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/produtos.js"></script>
</body>
</html>
